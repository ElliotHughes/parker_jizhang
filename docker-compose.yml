services:

  # ── 后端 API (Express + SQLite) ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: jizhang-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_PATH: /data/jizhang/jizhang.db
    volumes:
      - jizhang-data:/data/jizhang
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Web 静态文件 (nginx) ──────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: jizhang-web
    restart: unless-stopped
    networks:
      - default
      - caddy-net

volumes:
  jizhang-data:

networks:
  caddy-net:
    external: true
    name: xray_caddy_default
